known_limitations = [
  "Linux translation quality modes, document-job persistence, provider-catalog compatibility, and request-level translation presets are an unreleased deterministic checkpoint at Core 9cacf6364a2a2c6e63f65b336bb7dfe5d460518f, l10n 7f65596bd71be3ed6e179ade3bf2e436545436a2, and Linux 7817108aef100de6fa65946ffc8456f0fdbab2a4; Fast, Balanced, and Best remain request-level modes with shared translation-prompt-v2, while General, Technical, and Marketing are bounded preset identities included in prompts and translation-memory keys. Schema-18 document-job translation-preset persistence now survives legacy migration, pause, retry, and restart, and Linux validates all GTK preset adapters and model-listing policies against the bundled Core catalog before window creation. Live provider behavior, human copy/accessibility review, other clients, signing, rollback, and stable release remain unverified.",
  "Linux Azure OpenAI support is an unreleased deterministic loopback checkpoint at Core e46066ccafcd81e50b004c84d7eb8734e77f3279, l10n 8e0e50577f8714b90bcc08a0d22cc790319f9239, and Linux a679d57bf9b4d887d27fdd4c2cb2f87dfd6342db; it uses a pinned 2024-10-21 API version, api-key session authentication, and manual deployment selection. Live Azure account, quota, deployment availability, other clients, signing, rollback, and stable release remain unverified.",
  "Linux OpenAI Responses support is an unreleased deterministic typed-SSE checkpoint at Core 58075c997cecdcd9a179b9397cb493da375d3a50, l10n 95078b1a0c30defe98995a9879c4c669d213e5bc, and Linux 498323ee09a69f3183b903278efcab137836c3fb (Flatpak pin 62385d4228750711f232381805bbdab2f560b309); it uses /v1/models discovery, Bearer session authentication, and /v1/responses response.output_text.delta/response.completed events. Live OpenAI account, quota, model availability, other clients, signing, rollback, and stable release remain unverified.",
  "No compatible stable native-client release has been produced.",
  "Linux 0.1.0-alpha.2 is an unreleased multi-profile and session-onboarding checkpoint; create, update, activate, switch, delete, next-request routing, catalog-backed onboarding stage/detail guidance, active-provider transition/mode summaries, completion notification copy, and draft-locale notes, post-startup ENOSPC rollback, read-only-directory and corrupt-database fail-closed persistence boundaries, baseline GTK accessibility semantics, twelve official Linux PO packs with runtime Translate/Stop, workspace-widget, active-provider, status-summary/partial-output, text-file-import/export, glossary CSV import/export, Incognito request privacy policy with bounded local history and clear-history control, provider-profile, source-target, construction-stage provider/default-control and request-level glossary copy, stable Core compatibility/loopback-startup/profile-storage error copy, and theme-option switching plus source-buffer preservation across the tested Simplified Chinese-to-Arabic switch and Arabic RTL direction, bounded text import with source-editor drag-and-drop, persisted TXT/Markdown/CSV/JSON/HTML/SRT/WebVTT/DOCX/PPTX/XLSX document jobs with sequential segment translation, CSV delimiter/quote/line-ending preservation, selected-column boundaries, JSON string-path selection and escaping preservation, HTML tag/attribute/link/script/style protection and text-node reconstruction, bounded OOXML resource preservation, cue/timestamp preservation, cancellation, and restart recovery, asynchronous UTF-8 translation export with source-file overwrite protection, a bounded fixed-schema glossary CSV exchange path, a no-credential OpenAI-compatible loopback provider path, common protected-span and request-level glossary restoration across streamed output, bounded semantic long-text chunking with ordered sequential streaming and cancellation propagation, optional translation-memory policy/cache with versioned identity, Incognito bypass, inspection, export, exact deletion, and clear-all, explicit Linux standard-text fallback routing limited to a user-approved saved provider after retryable network or timeout failures, and ordinary-text dispatch through selected saved Core routing profiles with Ordered/Automatic connection and retryable stream fallback; document jobs, cancellation, authentication failures, model failures, unapproved profiles, and session-only profiles do not fall back; complete document-job routing remains unimplemented; the current GTK flow under X11 and headless Wayland are CI-verified with GTK 4.10-or-newer APIs. The GIO Secret Service adapter now sends a valid single-layer plain-string OpenSession Variant and passes isolated real-daemon CRUD/cleanup, persistent daemon-restart and locked-item fail-closed lifecycle checks, secure persistent-credential onboarding, and prompted store/delete approval, dismissal, and fail-closed verification; private notification-service transport, headless delivery to a real dunst notification daemon, a visible viewable Dunst window, the real document-portal lease lifecycle, a direct interactive xdg-desktop-portal-gtk FileChooser backend, the application-level GTK FileDialog callback, and a real source-editor URI-list drag/drop gesture are also verified; fallback-send confirmation is implemented, while complete visible-string gettext coverage and prompted Secret Service/portal unlock UI remain open. The default chunk budget is an approximate UTF-8 byte bound, not a tokenizer budget.",
  "Linux GTK routing profiles expose Manual, Ordered, and Automatic modes, with Manual normalized to exactly one first provider/model candidate, explicit fallback consent defaulting off, focusable candidate selection, keyboard-focusable up/down controls, row drag-and-drop ordering, existing-profile edit/upsert, bounded multiple profile IDs, duplicate-ID protection for new profiles, catalog-backed accessible names, localized source/output character plus approximate-token metrics, editable Core preference/privacy/streaming/document/provider-model allow-deny/quality/request-size constraints, source-level visible-string and fallback-template placeholder audits, canonical fallback-copy consistency, Flatpak source-pin integrity, CI checksum/SBOM evidence, native release-mode SHA-256/SPDX evidence, repository-only source-archive evidence, machine-contextual performance-baseline evidence, and descriptor-pinned final-database `openat2(RESOLVE_NO_SYMLINKS)` plus `O_NOFOLLOW | O_CLOEXEC` hardening at revision 7df461ec5e0d1cc5736e2c2edef48333fcf5ff14; persistent Secret Service store failures now offer an explicit localized session-only recovery modal that disables Remember and leaves Connect unsubmitted on Close; Core schema 17 persists the non-secret routing-profile ID and document quality mode, legacy schema-15 snapshots retain provider/model resume, document fallback remains disabled, and cross-client routing is unimplemented.",
  "Linux Flatpak manifest, generated Cargo source set, desktop metadata, icon, localized accessible labels, Manual single-candidate normalization, routing candidate drag ordering, saved-profile edit flow, multiple profile-ID validation, duplicate-ID protection, editor text metrics, routing constraint controls, fallback-send confirmation, visible-string and fallback-template placeholder audits, canonical fallback-copy consistency, compatible Flatpak source-pin validation, CI-only SHA-256/SPDX evidence, native release-mode evidence, repository-only source-archive evidence, performance-baseline evidence, headless Orca Speech Dispatcher integration evidence, opt-in third-party Ollama daemon harness, descriptor-pinned database hardening, read-only-directory fail-closed regression, and explicit Secret Service session-only recovery modal pass local validation at published revision 7df461ec5e0d1cc5736e2c2edef48333fcf5ff14; Push/PR Native, Flatpak, and Foundation runs `29717769144`/`29717769121`/`29717769119` and `29717770780`/`29717770833`/`29717770765` all passed (jobs `88274285611`/`88274285568`/`88274285482` and `88274289941`/`88274290099`/`88274289936`). The first fallback attempt's placeholder-audit and stale-pin failures remain recorded in the implementation status. A Docker Ollama daemon served /api/tags and /api/chat for qwen2.5-0.5b-instruct:latest; the harness reported 1 passed and no credential. Prompted Secret Service/portal unlock UI, parent-directory filesystem/VFS variants, GPU execution, the GTK4/Orca focus handoff limitation, physical compositor/GPU rendering, human listening, signing, source archives as standalone releases, rollback, portable performance budgets, and distributable artifacts remain unverified.",
  "Current Linux/Core evidence is pinned to Linux `f41e14af53b6d2d70b0f1d452ea32eda10d63095` and Core `a87aaf2bef7cca287c4a6faa8addd340e0245b0e`; Core's Anthropic Messages adapter and Linux GTK preset use manual model selection with pre-secret validation. Final Linux push/PR Native, Flatpak, and Foundation runs `29721751141`/`29721751155`/`29721751111` and `29721753040`/`29721753048`/`29721753045` passed. These are unreleased compatibility checkpoints only.",
  "Linux now includes an end-to-end deterministic Google Gemini Generate Content fixture and GTK/worker preset at Core `232881263f4f523ce54b3713d83513f2d0170ff2`, Linux `3edb91c5a17d774edffbd336564cfdc385f75fc5`, and l10n `f9d74a8f83a89540a58bba65477a5031031bd619`; live Gemini credentials, quota, account behavior, human copy/accessibility review, signing, rollback, and stable release remain unverified.",
  "Localization 0.1.0 is a 393-message development bundle whose non-English packs remain unreviewed machine-generated drafts; Linux consumes immutable l10n revision e1ee15a5e9470e2c49077e52b4969597a5c8283f with provider/model allow-deny, quality, request-size routing controls, and Anthropic GTK copy. Localization/Foundation runs 29720509844/29720509865 passed at that revision.",
  "Only mandatory acceptance Scenario 1 has complete release evidence; Linux Scenario 7 has Linux client and remote gate evidence for explicit and ordered/automatic ordinary-text fallback, and no scenario has stable-release evidence.",
  "The Ollama-compatible OpenAI /v1/ and native /api loopback wire contracts are verified with deterministic Linux/Core fixtures; Linux GTK now exposes localized preset selection and a passed opt-in third-party daemon harness. Docker Ollama /api/tags and /api/chat interoperability passed with qwen2.5-0.5b-instruct:latest without a credential; GPU acceleration and stable release remain unverified. Linux DOCX/XLSX wrapper regression fixtures now cover bounded office-package reconstruction, non-text part retention, selected-string boundaries, formula/number preservation, DOCX ZIP path-traversal rejection, and oversized-uncompressed-entry rejection; the worker queue lists multiple pending jobs for explicit selection, and worker end-to-end regressions translate persisted DOCX/XLSX jobs before reconstructing resources, formulas, and numeric cells."
]

