r-approved saved provider after retryable network or timeout failures; document jobs, cancellation, authentication failures, model failures, unapproved profiles, and session-only profiles do not fall back; the current GTK flow under X11 and headless Wayland are CI-verified with GTK 4.10-or-newer APIs. The GIO Secret Service adapter now sends a valid single-layer plain-string OpenSession Variant and passes isolated real-daemon CRUD/cleanup, persistent daemon-restart and locked-item fail-closed lifecycle checks, secure persistent-credential onboarding, and prompted store/delete fail-closed verification; private notification-service transport, headless delivery to a real dunst notification daemon, a visible viewable Dunst window, the real document-portal lease lifecycle, a direct interactive xdg-desktop-portal-gtk FileChooser backend, the application-level GTK FileDialog callback, and a real source-editor URI-list drag/drop gesture are also verified; complete visible-string gettext coverage and end-user prompt approval remain open. The default chunk budget is an approximate UTF-8 byte bound, not a tokenizer budget.",
