known_limitations = [
  "Linux AT-SPI status/error role extension was attempted at source/docs head 995c9fa2435f710a540a861a1ccace08d6fca728 but correctly failed the Native fixture because the pinned GTK/AT-SPI bridge exported empty status/error regions as ROLE_LABEL instead of ROLE_STATUS/ROLE_ALERT. Corrected docs/status head a4c9d3fde77e91f0655784d296f3a957367613a2 reverts that incompatible live-tree assertion and retains GTK unit-level semantic-role coverage. Corrected push Native/Flatpak/Foundation 29803843127/29803843131/29803843157 and PR Native/Flatpak/Foundation 29803845060/29803845055/29803845046 passed all jobs. Human Orca listening, a runtime-compatible live status/error fixture, translated-copy/RTL review, physical desktop rendering, other clients, signing, stable artifacts, and stable release remain open.",
  "Linux final database-component race hardening is verified at code head 93fd6f2b7d258c2c9902386ee1edb7a94c45fd9b with packaging/docs head 6b8cdc8426939fd19c7e977d5e0159a9a7fb35ac. The regression replaces the final database path with a symlink after pathname preflight and requires the descriptor open to reject it without modifying the target; the Flatpak source pin remains exact at the code head. The testing guide records the current no-default/demo-provider totals (`81 passed; 1 ignored` / `147 passed; 3 ignored`). Final push Native/Flatpak/Foundation 29802930525/29802930632/29802930547 and PR Native/Flatpak/Foundation 29802932689/29802932707/29802932683 passed all jobs. Broader filesystem/VFS and power-loss behavior, human review, other clients, signing, stable artifacts, and stable release remain open.",
  "Linux fallback-consent accessibility is verified at final documentation head 175eb00c19176ac8ff24c05843a62a81e7908c02, with code head 6c1d89f9c015e65a98568f71f40ade260554018b and Flatpak build-input pin 6c1d89f9c015e65a98568f71f40ade260554018b. The production checkbox now exports a localized AccessibleProperty::Label, the GTK semantic test asserts it, and the live AT-SPI fixture requires ROLE_CHECK_BOX. Final push Native/Flatpak/Foundation 29801687294/29801687305/29801687356 and PR Native/Flatpak/Foundation 29801689279/29801689288/29801689275 passed all jobs. The testing guide now distinguishes green automated gates from remaining human, physical-desktop, filesystem-race, signing, and stable-release work. This is unreleased Linux-first accessibility evidence; human Orca listening, translated-copy/RTL review, physical desktop rendering, other clients, signing, stable artifacts, and stable release remain open.",
  "Linux error-mapping localization coverage is verified at Linux 37539e7d4af4c207355e99ea7ea21f9949a52ab7. The source key audit now includes every error.* mapping declared in the Linux error category/state helpers, raising the checked catalog-backed set to 381 keys; placeholder and visible-string audits remain passing. Push Native/Flatpak/Foundation 29800104908/29800104899/29800104894 and PR Native/Flatpak/Foundation 29800106522/29800106523/29800106590 passed all jobs. This is unreleased Linux-first source evidence; human translated-copy/RTL review, other clients, signing, distributable artifacts, and stable release remain open.",
  "Linux AT-SPI action-name coverage is verified at Linux ef87a5b1fb6ebbfaaf8b9d4d93f572ae7f4bdf43. The live fixture requires named Open text file, Translate, Retry translation, and Stop translation controls with push-button roles, and the Allow approved fallback label/control with its GTK-exported label role; two text-editor roles remain covered. Local Python/Shell/diff checks and Linux no-default/demo-provider suites passed. Push Native/Flatpak/Foundation 29799549333/29799549300/29799549304 and PR Native/Flatpak/Foundation 29799551201/29799551179/29799551121 passed all jobs after correcting the initial checkbox-name assumption in 9bda65b. This is unreleased Linux-first accessibility evidence; GTK AT-SPI is not human Orca listening or physical-desktop review, and other clients, signing, stable artifacts, and stable release remain open.",
  "Core document decoder fuzz, AddressSanitizer smoke, and POSIX-descriptor one-shot bounded document lease consumption are verified at Core 19229184a21a6725326a3d30dea9bc72e5ac999f and Linux 43b9c5ee11397f5ce7fbf4033615b1609553f3c7. Core CI/Fuzz/Native SDK 29795469293/29795469253/29795469275, Linux push Native/Flatpak/Foundation 29798721356/29798721343/29798721336, and Linux PR Native/Flatpak/Foundation 29798723569/29798723560/29798723668 passed all jobs; protocol and document decoder targets completed 2,000 cargo-fuzz runs each on the fixed nightly toolchain, the C ABI smoke covers bounded UTF-8 document validation plus one-shot lease consumption from a duplicated POSIX descriptor, and CI evidence includes exact-pin rollback instructions without signing material. Android ParcelFileDescriptor and Windows handle transfer, other clients, signing, stable artifacts, and stable release remain unverified.",
  "Linux-first FileLease lifecycle checkpoint is verified at Core 8b096478b1623bdaf5105e8a8f59e55e2fa8015d and Linux f95780db3dd05fdccfe47af254f73c5107587077. Core local workspace/FFI/native SDK checks, Core CI 29784269272, and Native SDK 29784269356 passed; Linux local no-default/demo-provider, strict Clippy, localization, and Flatpak metadata checks passed; Linux PR Native/Flatpak/Foundation gates 29785377479/29785377512/29785377513 passed with jobs 88495671317/88495671975/88495671980; central coordination 29785760751 passed Linux/PowerShell jobs 88496851860/88496851914. Core exposes file_lease_v1 and Linux validates portal-read expiry/revocation, while ABI handle transfer and other clients remain unverified.",
  "ABI 1 compatibility snapshot projection is verified at Core c559b32d3869e01983f2bbf32f1386bad99c3290 and Linux b38a8fd722d4740abd161e30197354793e3de1f6. Core CI/Native SDK 29782822854/29782822883 passed; Linux PR Native/Flatpak/Foundation 29783023917/29783023872/29783023894 (jobs 88488352790/88488352708/88488352736) passed. The five-dimension query is available through the C ABI, while file leases, other clients, signing, rollback, and stable release remain unverified.",
  "Linux explainable routing diagnostics are verified at source/pin head ab82f36963a63f43091d94e960541fc173175724 with l10n 737d890e60fd34f15fd8708698448ef9ab96299f: typed events expose eligible candidates, rejected candidates with stable reasons, ranking inputs, and fallback order while excluding endpoints, credentials, source text, and translated output. Push Native/Flatpak/Foundation gates 29773735297/29773735296/29773735294 and PR gates 29773738883/29773738887/29773738924 passed; documentation head 458a920321ae16e6d3983213a286a972e34c8a18 also passed push gates 29774707677/29774707852/29774708075 and PR gates 29774709730/29774709849/29774710165. The PR remains Draft/Open and this is unreleased Linux-first evidence; human visual/copy review, end-user Orca acceptance, other clients, signing, rollback, and stable release remain unverified.",
  "Linux shared RetryPolicy is verified at Core 8790eb41a52c4e2c908044699e8c12597d3c42a5 and Linux source/pin 3ff10f4c9f54d82b7c43a0204946033cb063b92f: Core validates bounded backoff, jitter, Retry-After, circuit threshold, and cooldown values, while Linux consumes the same policy for approved fallback and circuit state. Core CI/Native SDK 29778375725/29778375728 passed. Documentation/source-pin head eb7e57869580917494d719ac61ec861c1c8bcff4 passed Linux push Native/Flatpak/Foundation 29778624703/29778624674/29778624715 and PR 29778626906/29778626865/29778626849. Final status head 857dac37c1d54c3987b69bd5b96e357fb8977e82 passed push Native/Flatpak/Foundation 29779357668/29779357649/29779357690 and PR 29779360891/29779360949/29779361066 (jobs 88476555747/88476555602/88476555686 and 88476567289/88476567432/88476567728). The PR remains Draft/Open and this remains unreleased Linux-first evidence; provider quota behavior, physical review, other clients, signing, rollback, and stable release remain unverified.",
  "Core RetryPolicy serialized-boundary validation is verified at Core 6e8c40224943a6ba892e5a064fb3b00657b3bf47 and Linux documentation/source-pin head 5b807093c05995a3029e60bb3563ba55200597f9. Deserialization reuses RetryPolicy::new, rejecting unbounded backoff, jitter, circuit threshold, and cooldown values. Linux local no-default/demo-provider tests, strict Clippy, localization audits, Flatpak metadata, and GitHub Foundation/Native/Flatpak gates 29780440569/29780440461/29780440421 (jobs 88480156512/88480156210/88480155904) passed. The PR remains Draft/Open and this remains unreleased Linux-first evidence; other clients, stable distribution, signing, rollback, and live quota behavior remain unverified.",
  "ABI 1 host-secret response projection is verified at Core adc1e26f37db3761406bb30aa7515003a8bd2717 and Linux documentation/source-pin head 016c4d79131b08ad5eb66e0b7561b9e3e50f02b0. The versioned protocol carries only a non-secret secret_ref command field, Core emits one secret_required event, and matching host_secret_response values are bounded, correlated, one-shot, and never persisted or logged. Core CI/Native SDK 29781845494/29781845502 passed. Linux Foundation/Native/Flatpak gates 29781942858/29781942757/29781942821 (jobs 88484970323/88484969938/88484969961) passed. The PR remains Draft/Open and this remains unreleased Linux-first evidence; file leases, other clients, signing, rollback, and stable release remain unverified; the later compatibility snapshot checkpoint covers semantic/catalog/feature negotiation.",
  "Linux bounded routing retry is verified at Core c03bd205e1d135c024f3a0a767dd94770030a723 and Linux source/pin 4b345763af46bc4cd23bdecc54ecb6b8b52e597a: HTTP providers carry bounded optional Retry-After hints, while Linux uses an eight-second maximum backoff, stable candidate-key jitter, shutdown cancellation, and a two-failure/30-second in-memory circuit breaker. Core CI/Native SDK 29776309259/29776309263 and Linux source/pin push/PR Native/Flatpak/Foundation gates 29776662997/29776663334/29776662987 and 29776667400/29776667014/29776667068 passed; documentation head 2a75ac0449dcc577ec263b73929c4c89ca10f063 also passed push Native/Flatpak/Foundation 29777101390/29777101871/29777101540 and PR 29777102953/29777103017/29777103023. Central coordination commit adaa2a16e127b508b630c3a7711a2cb19d26ecb0 passed workflow 29777574182. This remains unreleased Linux-first evidence; provider quota behavior, physical review, other clients, signing, rollback, and stable release remain unverified.",
  "Linux GTK routing candidate accessibility lifecycle is verified at Linux 1c47ff9b6b103ee16d564480d3dd3cdfcda5e083: the dedicated serialized DBus/Xvfb fixture checks labelled/focusable profile and candidate controls, accessible up/down labels, row reordering, Manual single-candidate enforcement, and Use close-and-select behavior. Push Native/Flatpak/Foundation gates 29771475803/29771475775/29771475669 and PR gates 29771479057/29771478869/29771478884 passed; the PR remains Draft/Open and this is unreleased evidence only. Human visual/copy review, end-user Orca acceptance, other clients, signing, rollback, and stable release remain unverified.",
  "Linux GTK fallback approval lifecycle is verified at Linux 62d70b1c57662515fadb447aa625cabe1b5d74e9: the dedicated DBus/Xvfb fixture proves Close leaves approval and dispatch untouched, while one Translate action records one-shot approval and dispatches exactly once. Push Native/Flatpak/Foundation gates 29770058909/29770058926/29770058895 and PR gates 29770062559/29770062414/29770062090 passed; the PR remains Draft/Open and this is unreleased evidence only.",
  "Linux Automatic routing worker integration is an unreleased deterministic checkpoint at Core 115535c76d804020f045708867af7798b8d0294a, l10n 7e8c987737444d4e0f8f2642b108eee4c7801f58, and Linux 0e2ae25c321cef243275d1322f2b8271f0602d06; the worker verifies quality-ranked selection and retryable fallback only through the saved profile's explicit chain. Final documentation-head push/PR Native, Flatpak, and Foundation gates passed at 75910c8; document-job fallback, other clients, live provider behavior, human review, signing, rollback, and stable release remain unverified.",
  "Linux explicit provider connection testing is an unreleased deterministic checkpoint at Core 115535c76d804020f045708867af7798b8d0294a, l10n 7e8c987737444d4e0f8f2642b108eee4c7801f58, and Linux 02efde00fb9faf3abfc4ab5dcf19b9c6036be656; model discovery uses a temporary cancellable session, clears entered credentials, and leaves the active profile/model and persistence unchanged. Remote Native/Flatpak/Foundation gates are required before this checkpoint is considered verified; live provider behavior, other clients, signing, rollback, and stable release remain unverified.",
  "Linux routing-profile JSON exchange is an unreleased deterministic checkpoint at Core 115535c76d804020f045708867af7798b8d0294a, l10n 026c35b8dbb1c13c22d77809cc5fe72e6af6f5a3, and Linux e6d87958ce13e8ccfb04a62c22b8bb5657bbb69e; Core bounds exchange files to validated non-secret fields and 64 KiB, while Linux GTK import rejects unknown fields, malformed/non-UTF-8/duplicate-ID files and never overwrites an existing profile. Push/PR Linux Native, Flatpak, and Foundation gates passed; other clients, live provider behavior, human copy/accessibility review, signing, rollback, and stable release remain unverified.",
  "Linux translation quality modes, document-job persistence, provider-catalog compatibility, and request-level translation presets are an unreleased deterministic checkpoint at Core 115535c76d804020f045708867af7798b8d0294a, l10n 026c35b8dbb1c13c22d77809cc5fe72e6af6f5a3, and Linux e6d87958ce13e8ccfb04a62c22b8bb5657bbb69e; Fast, Balanced, and Best remain request-level modes with shared translation-prompt-v2, while General, Technical, and Marketing are bounded preset identities included in prompts and translation-memory keys. Schema-18 document-job translation-preset persistence now survives legacy migration, pause, retry, and restart, and Linux validates all GTK preset adapters and model-listing policies against the bundled Core catalog before window creation. Live provider behavior, human copy/accessibility review, other clients, signing, rollback, and stable release remain unverified.",
  "Linux Azure OpenAI support is an unreleased deterministic loopback checkpoint at Core e46066ccafcd81e50b004c84d7eb8734e77f3279, l10n 8e0e50577f8714b90bcc08a0d22cc790319f9239, and Linux a679d57bf9b4d887d27fdd4c2cb2f87dfd6342db; it uses a pinned 2024-10-21 API version, api-key session authentication, and manual deployment selection. Live Azure account, quota, deployment availability, other clients, signing, rollback, and stable release remain unverified.",
  "Linux OpenAI Responses support is an unreleased deterministic typed-SSE checkpoint at Core 58075c997cecdcd9a179b9397cb493da375d3a50, l10n 95078b1a0c30defe98995a9879c4c669d213e5bc, and Linux 498323ee09a69f3183b903278efcab137836c3fb (Flatpak pin 62385d4228750711f232381805bbdab2f560b309); it uses /v1/models discovery, Bearer session authentication, and /v1/responses response.output_text.delta/response.completed events. Live OpenAI account, quota, model availability, other clients, signing, rollback, and stable release remain unverified.",
  "No compatible stable native-client release has been produced.",
  "Linux 0.1.0-alpha.2 is an unreleased multi-profile and session-onboarding checkpoint; create, update, activate, switch, delete, next-request routing, catalog-backed onboarding stage/detail guidance, active-provider transition/mode summaries, completion notification copy, and draft-locale notes, post-startup ENOSPC rollback, read-only-directory and corrupt-database fail-closed persistence boundaries, baseline GTK accessibility semantics, twelve official Linux PO packs with runtime Translate/Stop, workspace-widget, active-provider, status-summary/partial-output, text-file-import/export, glossary CSV import/export, Incognito request privacy policy with bounded local history and clear-history control, provider-profile, source-target, construction-stage provider/default-control and request-level glossary copy, stable Core compatibility/loopback-startup/profile-storage error copy, and theme-option switching plus source-buffer preservation across the tested Simplified Chinese-to-Arabic switch and Arabic RTL direction, bounded text import with source-editor drag-and-drop, persisted TXT/Markdown/CSV/JSON/HTML/SRT/WebVTT/DOCX/PPTX/XLSX document jobs with sequential segment translation, CSV delimiter/quote/line-ending preservation, selected-column boundaries, JSON string-path selection and escaping preservation, HTML tag/attribute/link/script/style protection and text-node reconstruction, bounded OOXML resource preservation, cue/timestamp preservation, cancellation, and restart recovery, asynchronous UTF-8 translation export with source-file overwrite protection, a bounded fixed-schema glossary CSV exchange path, a no-credential OpenAI-compatible loopback provider path, common protected-span and request-level glossary restoration across streamed output, bounded semantic long-text chunking with ordered sequential streaming and cancellation propagation, optional translation-memory policy/cache with versioned identity, Incognito bypass, inspection, export, exact deletion, and clear-all, explicit Linux standard-text fallback routing limited to a user-approved saved provider after retryable network or timeout failures, ordinary-text dispatch through selected saved Core routing profiles with Ordered/Automatic connection and retryable stream fallback, and document-job dispatch through a selected saved document-capable routing profile with non-secret profile-ID restart recovery; document jobs, cancellation, authentication failures, model failures, unapproved profiles, and session-only profiles do not fall back; document-job fallback and cross-client routing remain disabled; the current GTK flow under X11 and headless Wayland are CI-verified with GTK 4.10-or-newer APIs. The GIO Secret Service adapter now sends a valid single-layer plain-string OpenSession Variant and passes isolated real-daemon CRUD/cleanup, persistent daemon-restart and locked-item fail-closed lifecycle checks, secure persistent-credential onboarding, and prompted store/delete approval, dismissal, and fail-closed verification; private notification-service transport, headless delivery to a real dunst notification daemon, a visible viewable Dunst window, the real document-portal lease lifecycle, a direct interactive xdg-desktop-portal-gtk FileChooser backend, the application-level GTK FileDialog callback, and a real source-editor URI-list drag/drop gesture are also verified; fallback-send confirmation is implemented, while complete visible-string gettext coverage and prompted Secret Service/portal unlock UI remain open. The default chunk budget is an approximate UTF-8 byte bound, not a tokenizer budget.",
  "macOS 0.1.0-alpha.1 is an unreleased native SwiftUI/AppKit text slice at client cad822c, pinned to project b75d4d1, Core 0db51464, and l10n 7e8c987 with ABI 1 and protocol 1. Native CI run 29765906044 passed source validation, Core XCFramework and Swift wrapper checks, strict concurrency, unit/integration tests, app assembly, and ad-hoc signing smoke coverage. Typed host-secret transport, model discovery, persisted routing profiles, document jobs, notarization, distribution signing, rollback, other clients, and stable release remain unverified.",
  "Linux GTK routing profiles expose Manual, Ordered, and Automatic modes, with Manual normalized to exactly one first provider/model candidate, explicit fallback consent defaulting off, focusable candidate selection, keyboard-focusable up/down controls, row drag-and-drop ordering, existing-profile edit/upsert, bounded multiple profile IDs, duplicate-ID protection for new profiles, catalog-backed accessible names, localized source/output character plus approximate-token metrics, editable Core preference/privacy/streaming/document/provider-model allow-deny/quality/request-size constraints, source-level visible-string and fallback-template placeholder audits, canonical fallback-copy consistency, Flatpak source-pin integrity, CI checksum/SBOM evidence, native release-mode SHA-256/SPDX evidence, repository-only source-archive evidence, machine-contextual performance-baseline evidence, and descriptor-pinned final-database `openat2(RESOLVE_NO_SYMLINKS)` plus `O_NOFOLLOW | O_CLOEXEC` hardening at revision 7df461ec5e0d1cc5736e2c2edef48333fcf5ff14; persistent Secret Service store failures now offer an explicit localized session-only recovery modal that disables Remember and leaves Connect unsubmitted on Close; Core schema 17 persists the non-secret routing-profile ID and document quality mode, legacy schema-15 snapshots retain provider/model resume, document fallback remains disabled, and cross-client routing is unimplemented.",
  "Linux Flatpak manifest, generated Cargo source set, desktop metadata, icon, localized accessible labels, Manual single-candidate normalization, routing candidate drag ordering, saved-profile edit flow, multiple profile-ID validation, duplicate-ID protection, editor text metrics, routing constraint controls, fallback-send confirmation, visible-string and fallback-template placeholder audits, canonical fallback-copy consistency, compatible Flatpak source-pin validation, CI-only SHA-256/SPDX evidence, native release-mode evidence, repository-only source-archive evidence, performance-baseline evidence, headless Orca Speech Dispatcher integration evidence, opt-in third-party Ollama daemon harness, descriptor-pinned database hardening, read-only-directory fail-closed regression, and explicit Secret Service session-only recovery modal pass local validation at published revision 7df461ec5e0d1cc5736e2c2edef48333fcf5ff14; Push/PR Native, Flatpak, and Foundation runs `29717769144`/`29717769121`/`29717769119` and `29717770780`/`29717770833`/`29717770765` all passed (jobs `88274285611`/`88274285568`/`88274285482` and `88274289941`/`88274290099`/`88274289936`). The first fallback attempt's placeholder-audit and stale-pin failures remain recorded in the implementation status. A Docker Ollama daemon served /api/tags and /api/chat for qwen2.5-0.5b-instruct:latest; the harness reported 1 passed and no credential. Prompted Secret Service/portal unlock UI, parent-directory filesystem/VFS variants, GPU execution, the GTK4/Orca focus handoff limitation, physical compositor/GPU rendering, human listening, signing, source archives as standalone releases, rollback, portable performance budgets, and distributable artifacts remain unverified.",
  "Current Linux/Core evidence is pinned to Linux `f41e14af53b6d2d70b0f1d452ea32eda10d63095` and Core `a87aaf2bef7cca287c4a6faa8addd340e0245b0e`; Core's Anthropic Messages adapter and Linux GTK preset use manual model selection with pre-secret validation. Final Linux push/PR Native, Flatpak, and Foundation runs `29721751141`/`29721751155`/`29721751111` and `29721753040`/`29721753048`/`29721753045` passed. These are unreleased compatibility checkpoints only.",
  "Linux now includes an end-to-end deterministic Google Gemini Generate Content fixture and GTK/worker preset at Core `232881263f4f523ce54b3713d83513f2d0170ff2`, Linux `3edb91c5a17d774edffbd336564cfdc385f75fc5`, and l10n `f9d74a8f83a89540a58bba65477a5031031bd619`; live Gemini credentials, quota, account behavior, human copy/accessibility review, signing, rollback, and stable release remain unverified.",
  "Localization 0.1.0 is a 393-message development bundle whose non-English packs remain unreviewed machine-generated drafts; Linux consumes immutable l10n revision e1ee15a5e9470e2c49077e52b4969597a5c8283f with provider/model allow-deny, quality, request-size routing controls, and Anthropic GTK copy. Localization/Foundation runs 29720509844/29720509865 passed at that revision.",
  "Only mandatory acceptance Scenario 1 has complete release evidence; Linux Scenario 7 has Linux client and remote gate evidence for explicit and ordered/automatic ordinary-text fallback, and no scenario has stable-release evidence.",
  "The Ollama-compatible OpenAI /v1/ and native /api loopback wire contracts are verified with deterministic Linux/Core fixtures; Linux GTK now exposes localized preset selection and a passed opt-in third-party daemon harness. Docker Ollama /api/tags and /api/chat interoperability passed with qwen2.5-0.5b-instruct:latest without a credential; GPU acceleration and stable release remain unverified. Linux DOCX/XLSX wrapper regression fixtures now cover bounded office-package reconstruction, non-text part retention, selected-string boundaries, formula/number preservation, DOCX ZIP path-traversal rejection, and oversized-uncompressed-entry rejection; the worker queue lists multiple pending jobs for explicit selection, and worker end-to-end regressions translate persisted DOCX/XLSX jobs before reconstructing resources, formulas, and numeric cells."
]

