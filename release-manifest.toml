proved saved provider after retryable network or timeout failures, and ordinary-text dispatch through selected saved Core routing profiles with Ordered/Automatic connection and retryable stream fallback; document jobs, cancellation, authentication failures, model failures, unapproved profiles, and session-only profiles do not fall back; complete document-job routing remains unimplemented; the current GTK flow under X11 and headless Wayland are CI-verified with GTK 4.10-or-newer APIs. The GIO Secret Service adapter now sends a valid single-layer plain-string OpenSession Variant and passes isolated real-daemon CRUD/cleanup, persistent daemon-restart and locked-item fail-closed lifecycle checks, secure persistent-credential onboarding, and prompted store/delete approval, dismissal, and fail-closed verification; private notification-service transport, headless delivery to a real dunst notification daemon, a visible viewable Dunst window, the real document-portal lease lifecycle, a direct interactive xdg-desktop-portal-gtk FileChooser backend, the application-level GTK FileDialog callback, and a real source-editor URI-list drag/drop gesture are also verified; fallback-send confirmation is implemented, while complete visible-string gettext coverage and prompted Secret Service/portal unlock UI remain open. The default chunk budget is an approximate UTF-8 byte bound, not a tokenizer budget.",
  "Linux GTK routing profiles expose Manual, Ordered, and Automatic modes, explicit fallback consent defaulting off, focusable candidate selection, keyboard-focusable up/down controls, row drag-and-drop ordering, existing-profile edit/upsert, bounded multiple profile IDs, duplicate-ID protection for new profiles, catalog-backed accessible names, localized source/output character plus approximate-token metrics, editable Core preference/privacy/streaming/document/provider-model allow-deny/quality/request-size constraints, source-level visible-string and fallback-template placeholder audits, canonical fallback-copy consistency, Flatpak source-pin integrity, CI checksum/SBOM evidence, native release-mode SHA-256/SPDX evidence, repository-only source-archive evidence, and machine-contextual performance-baseline evidence at revision 81eed4f051e0f70406efbe47dca82e4f215c4cce; Core schema 16 persists only the non-secret routing-profile ID, legacy schema-15 snapshots retain provider/model resume, document fallback remains disabled, and cross-client routing is unimplemented.",
