name: Bug report
description: Report reproducible incorrect LinguaMesh behavior
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private documents, or unnecessary translation content. Report vulnerabilities through SECURITY.md instead.
  - type: dropdown
    id: repository
    attributes:
      label: Affected repository
      options:
        - linguamesh-project
        - linguamesh-core
        - linguamesh-l10n
        - linguamesh-android
        - linguamesh-windows
        - linguamesh-macos
        - linguamesh-linux
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Version or revision
      placeholder: Version, tag, or commit ID
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Actual behavior
      description: Describe the safe, redacted result.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction and validation
      description: List deterministic steps, platform, and commands without sensitive data.
    validations:
      required: true

