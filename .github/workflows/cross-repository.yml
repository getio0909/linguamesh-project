name: Cross-repository status

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read

jobs:
  workspace:
    name: Validate canonical workspace
    runs-on: ubuntu-24.04
    steps:
      # 固定 actions/checkout v7.0.0。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: linguamesh-project
      # 固定 actions/setup-python v6.3.0。
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Clone public siblings and validate goal pins
        working-directory: linguamesh-project
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: bash tools/bootstrap.sh --owner "$GITHUB_OWNER"
