name: Validate project coordination

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  linux:
    name: Linux validation
    runs-on: ubuntu-24.04
    steps:
      # 固定 actions/checkout v7.0.0。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # 固定 actions/setup-python v6.3.0。
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Validate manifests, documentation, and credential hygiene
        run: bash tools/check-workspace.sh
      - name: Test manifest-only rollback rehearsal
        run: python3 tools/test-release-rollback.py

  windows:
    name: PowerShell validation
    runs-on: windows-2022
    steps:
      # 固定 actions/checkout v7.0.0。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Validate manifests and credential hygiene
        shell: pwsh
        run: ./tools/check-workspace.ps1
